sources:
 my-bq-source:
   kind: bigquery
   project: my-chrt-apr-hck-project

tools:
 search_administration_bq:
   kind: bigquery-sql
   source: my-bq-source
   statement: |
    SELECT
     A.COUNTRY_NAME,A.STATE_NAME,A.SCHOOL_NAME,A.REGION,A.TOTAL_BRANCHES,A.ACADEMIC_FEES,A.ACTIVITY_FEES,A.ADMISSION_FEES,
    C.SESSION_START_DATE,C.SESSION_END_DATE,C.ANNUAL_DAY,C.SUMMER_HOLIDAYS,C.WINTER_HOLIDAYS,C.QUARTERLY_MEETING_Q1,C.QUATERLY_MEETING_Q4
    FROM my-chrt-apr-hck-project.administration.consultations C
    LEFT JOIN my-chrt-apr-hck-project.administration.admin_data A
    ON 
    C.COUNTRY_CD = A.COUNTRY_CODE
    AND C.STATE_CD  = A.STATE_CD
   description: |
    Use this tool to get information on Academic Admissions in various schools across Country, States, Region, fees, holiday, Session details.

  
search_bigquery-public-data-baseball_bq:
   kind: bigquery-sql
   source: my-bq-source
   statement: |
    SELECT * FROM `bigquery-public-data.baseball.games_post_wide` 
    where 
    venueCity = 'Toronto'
    and gameStatus = 'closed'
    and venueName = 'Progressive Field'
    limit 10;
   description: |
    Use this tool to get information on baseball dataset for specific year, city,with closed status.


toolsets:
 my_bq_toolset:
   - search_administration_bq
   - search_bigquery-public-data-baseball_bq
   -
